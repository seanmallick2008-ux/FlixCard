<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                       VERSIONING                           █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  SCHEMA: Semantic Versioning → MAJOR.MINOR.PATCH
  CURRENT VERSION: 0.5.1  (auto-derived from VERSION_LOG)

  MAJOR – Complete rebuild or breaking change
  ── Example: full UI redesign
  ── Example: JSON structure changes (old files become incompatible)
  ── Example: an entire page is replaced or removed
  ── → Increment resets MINOR and PATCH to 0

  MINOR – New feature or new page
  ── Example: Quiz mode added                    → 0.1.0 → 0.2.0
  ── Example: Multi-language support added       → 0.2.0 → 0.3.0
  ── Example: New statistics view                → 0.3.0 → 0.4.0
  ── → Increment resets PATCH to 0

  PATCH – Bugfix, small adjustment OR layout/rule change
  ── Example: Progress bar shows wrong %         → 0.1.0 → 0.1.1
  ── Example: Button colour corrected            → 0.1.1 → 0.1.2
  ── Example: Breakpoint value adjusted          → 0.1.2 → 0.1.3
  ── Example: New rule added to Blueprint        → 0.1.3 → 0.1.4
  ── IMPORTANT: Blueprint changes also require a PATCH entry

  AUTOMATION (single source of truth):
  ── VERSION_LOG in the code is the only source of truth
  ── APP_VERSION is automatically derived from the last entry
  ── File title, nav, welcome screen → all updated automatically
  ── New release = new entry in VERSION_LOG + i18n key in all 4 languages

  VERSION HISTORY (complete, all entries):
  ── 0.1.0  [MINOR]  Welcome screen, library, deck management
  ── 0.2.0  [MINOR]  Deck detail, create deck, manage cards
  ── 0.3.0  [MINOR]  Flashcards, quiz, spaced repetition
  ── 0.3.1  [PATCH]  Bugfixes: card flip, quiz answers, summary
  ── 0.4.0  [MINOR]  Statistics, settings, language selection, reset
  ── 0.5.0  [MINOR]  Main interface (Hub), responsive layout, i18n version log
  ── 0.5.1  [PATCH]  Responsive layout phone & tablet, auto version, i18n fix

  DISPLAY IN APP (Settings):
  ── All entries visible (MAJOR + MINOR + PATCH)
  ── Type badge coloured: MAJOR = Red, MINOR = Gold, PATCH = Dimmed
  ── Newest version first
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                      DESIGN RULES                          █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  STYLE: Editorial / Dark
  ── Background:         #12100e  (very dark brown-black)
  ── Surface:            #1a1714  (slightly lighter brown for cards)
  ── Primary text:       #e8e0d0  (warm off-white)
  ── Accent colour:      #c8a96e  (gold)
  ── Gold dimmed:        #7a6540  (for secondary gold elements)
  ── Dividers:           #2a2520  (dark brown)
  ── Secondary text:     #5a5040  (dimmed brown)
  ── Error / Wrong:      #c0392b  (dark red)
  ── Success / Correct:  #4a7c59  (dark green)

  ALL COLOUR VALUES AS CSS VARIABLES:
  ── var(--bg)           = #12100e
  ── var(--surface)      = #1a1714
  ── var(--text-primary) = #e8e0d0
  ── var(--gold)         = #c8a96e
  ── var(--gold-dim)     = #7a6540
  ── var(--border)       = #2a2520
  ── var(--text-dim)     = #5a5040
  ── var(--error)        = #c0392b
  ── var(--success)      = #4a7c59

  TYPOGRAPHY:
  ── Display font:    'Playfair Display' (Serif) → titles, headings, italic
  ── Body font:       'DM Sans' → body text, labels, buttons
  ── Monospace:       'Space Mono' → numbers, statistics, version numbers

  FONT SIZES:
  ── H1 (page title):         clamp(1.6rem, 5vw, 2.2rem) – Playfair Display
  ── H2 (section title):      1.3rem – Playfair Display
  ── Label / Navigation:      0.6–0.65rem, letter-spacing: 2px, uppercase – DM Sans
  ── Body text:               0.88rem – DM Sans
  ── Statistic numbers:       2rem – Space Mono
  ── Version numbers:         0.62rem – Space Mono

  BORDER-RADIUS:
  ── Cards / containers / buttons:  0px  (sharp – editorial)
  ── Exception: progress bar:       2px
  ── Exception: spinner:            50%

  ANIMATIONS:
  ── Page transitions:    fade-in 200ms ease
  ── Card flip:           CSS flip 400ms ease (perspective: 1000px)
  ── Hover effects:       colour/border transition 150ms
  ── Spinner:             rotate 800ms linear infinite
  ── No unnecessary animations – calm, elegant UI

  NAVIGATION:
  ── Always sticky top (position: sticky, top: 0, z-index: 100)
  ── Height: var(--nav-h) = 48px (xs/sm) / 56px (md/lg)
  ── Left: app name + version (Playfair, gold)
  ── Right: current page (uppercase label) OR back button
  ── Bottom border: 1px solid var(--border)
  ── Background: var(--bg) – so content scrolls beneath

  DIVIDERS:
  ── Always 1px solid var(--border)
  ── Never thicker, never a different colour without a Blueprint entry
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                RESPONSIVE LAYOUT RULES                     █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  APPROACH: Mobile-first – base styles apply to XS, then breakpoints upward

  BREAKPOINTS:
  ── XS  < 480px     Small smartphone (default, no media query)
  ── SM  480–767px   Large smartphone / phablet
  ── MD  768–1023px  Tablet
  ── LG  ≥ 1024px    Laptop / desktop

  CSS VARIABLES PER BREAKPOINT:
  ── XS:  --nav-h: 48px  --pad-h: 16px  --pad-card: 14px  --gap: 16px
  ── SM:  --pad-h: 20px  --pad-card: 18px  --gap: 20px
  ── MD:  --nav-h: 56px  --pad-h: 28px  --pad-card: 22px  --gap: 24px
  ── LG:  --nav-h: 56px  --pad-h: 32px  --pad-card: 24px  --gap: 28px

  APP COLUMN:
  ── XS/SM: full width, no borders
  ── MD:    max-width: 600px, centred, side borders 1px solid var(--border)
  ── LG:    max-width: 680px, centred, side borders + grid-line background

  TOUCH TARGETS:
  ── Minimum height of all clickable elements: 56px (XS), relaxed from MD
  ── Buttons: padding 14px 20px (XS) → 12px 28px (LG)

  HOVER EFFECTS:
  ── Mouse devices only: @media (hover: hover)
  ── Touch: :active for tap feedback, no :hover

  FONT SCALING:
  ── XS: 0.88rem  SM: 0.90rem  MD/LG: 0.95rem
  ── Never below 0.88rem for body text (readability)

  FLASHCARD:
  ── XS: min-height 200px  SM: 220px  MD: 260px  LG: 280px
  ── Text: XS: 1.4rem  SM: 1.7rem  MD: 2.0rem  LG: 2.2rem

  VERY NARROW DEVICES (< 360px):
  ── Summary stats: flex-direction: column
  ── Deck stats: flex-wrap: wrap, 2 per row
  ── No horizontal scrolling allowed

  ALLOWED SPACING VALUES (from the grid):
  ── 4px, 8px, 12px, 14px, 16px, 18px, 20px, 22px, 24px, 28px, 32px, 40px
  ── Other values only with a comment justification in the code
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                    DATA & STORAGE                          █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  CONCEPT: Each user has their own JSON file
  ── The HTML file (index.html) is the app – share it, don't modify it
  ── The JSON file (flixcard-data.json) holds personal data
  ── No cloud, no account, no Storage API

  JSON STRUCTURE (currently implemented):
  ──{
  ──  "version": "1.0",           // JSON format version (not app version)
  ──  "language": "en",           // Language: en | de | fr | es
  ──  "stats": {
  ──    "streak": 7,
  ──    "lastStudyDay": "2026-04-27",
  ──    "totalLearned": 142
  ──  },
  ──  "decks": [
  ──    {
  ──      "id": "uuid",
  ──      "name": "Spanish B1",
  ──      "description": "Basic vocabulary",
  ──      "created": "2026-01-10",
  ──      "cards": [
  ──        {
  ──          "id": "uuid",
  ──          "front": "Dog",
  ──          "back": "el perro",
  ──          "learned": false,
  ──          "errorRate": 0.2,
  ──          "streak": 0,
  ──          "nextReview": "2026-04-28"
  ──        }
  ──      ]
  ──    }
  ──  ]
  ──}

  ON START:
  ── No JSON loaded → Welcome screen (page 0)
  ── JSON loaded → applyLanguage() → renderLibrary() → Library (page 1)

  SAVING:
  ── No auto-save (browser security)
  ── Unsaved banner appears on every change
  ── User clicks "Save JSON" → downloads as flixcard-data.json

  JSON COMPATIBILITY:
  ── JSON structure must NEVER change without a MAJOR version increment
  ── App checks "version" field on import
  ── Incompatible version → clear error message, no silent failure
  ── New optional fields allowed (MINOR) – old app ignores them
  ── Missing fields → use default value, no crash
-->

  ██████████████████████████████████████████████████████████████
  █                                                            █
  █               PAGES & NAVIGATION PLAN                      █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  ── [1] page-library       → All decks (main page after loading data)
  ── [2] page-deck-detail   → Deprecated, redirects to Hub (openDeck → openHub)
  ── [3] page-create-deck   → Create or edit a deck
  ── [4] page-manage-cards  → Manage cards within a deck
  ── [5] page-hub           → Main interface: all modes for a deck
  ── [6] page-flashcard     → Flashcard learning mode
  ── [6b] page-summary      → Result summary after a session
  ── [7] page-quiz          → Multiple-choice quiz
  ── [8] page-stats         → Statistics (streak, progress)
  ── [9] page-settings      → Settings (language, import, export, reset)
  ── [U] update-overlay     → Automatic update overlay (outside page system)

  NAVIGATION FLOW:
  ── Welcome → (Import / Fresh start) → Library
  ── Library → Hub (click on deck)
  ── Hub → Flashcard / Quiz / Spaced Rep / Manage Cards / Stats / Settings
  ── All modes → Summary or directly → Hub
  ── Settings / Stats → Library (back)
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                AUTO-UPDATE CHECKER RULES                   █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  PURPOSE:
  ── App checks every 20s whether a new version is live on GitHub Pages
  ── Newer version detected → show overlay (no interaction possible)
  ── Once deploy is complete → automatic reload

  TECHNICAL:
  ── URL: https://seanmallick2008-ux.github.io/FlixCard/index.html
  ── Cache-bust: ?_=Date.now() on every fetch
  ── Version detection: regex on VERSION_LOG in source code
  ── Comparison: semver comparison MAJOR.MINOR.PATCH

  FLOW:
  ── Phase 1 (every 20s): New version detected? → show overlay
  ── Phase 2 (every 20s): Wait until deploy is done → reload
  ── Network error: silently ignored, retry at next interval

  OVERLAY RULES:
  ── No interaction possible while overlay is active
  ── Shows: old version → new version, spinner, status text
  ── No close button – user must wait
  ── Backdrop-filter: blur(6px) for dramatic effect

  CONSTANTS:
  ── UPDATE_CHECK_URL:      GitHub Pages URL of index.html
  ── UPDATE_CHECK_INTERVAL: 20000ms (20 seconds)
  ── First check: after 20s delay (no immediate check on load)
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                  MULTI-LANGUAGE (i18n)                     █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  SUPPORTED LANGUAGES:
  ── English (base / fallback) ← REQUIRED, always complete
  ── German
  ── French
  ── Spanish

  RULES:
  ── No hardcoded text in HTML or JS – without exception
  ── Every new string must be entered in all 4 languages
  ── Missing translation key → fall back to English, never empty
  ── English is the base – write in English first, then translate
  ── All keys in camelCase English (e.g. "libraryTitle")
  ── Version log descriptions are also i18n keys (e.g. "ver051")

  LANGUAGE SWITCHING:
  ── setLanguage(lang) → set state.language → call applyLanguage()
  ── applyLanguage() re-renders ALL visible UI strings
  ── Language is saved in the user's JSON file
  ── On import: applyLanguage() is called immediately after loading

  ADDING NEW STRINGS:
  ── 1. Add key to i18n.en (required)
  ── 2. Add key to i18n.de, i18n.fr, i18n.es (required)
  ── 3. Use t('key') in HTML/JS – never write text directly
  ── 4. Update applyLanguage() if the text is dynamically rendered
-->

<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █              JSON COMPATIBILITY RULES                      █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  GOLDEN RULE:
  ── JSON structure must NEVER change without a MAJOR version increment
  ── Old JSON files must continue to work with the old app version

  ON IMPORT:
  ── App checks the "version" field in the JSON
  ── Compatible → load normally → applyLanguage() → Library
  ── Incompatible → error message with old + expected version
  ── Missing "version" field → treat as "1.0"

  NEW FIELDS (MINOR):
  ── New optional fields allowed without MAJOR increment
  ── Old app: ignores unknown fields (no crash)
  ── New app: missing fields → set default value
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                  UI CONSISTENCY RULES                      █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  COLOURS:
  ── CSS variables only (var(--gold), var(--border) etc.) – never hex directly
  ── No inline styles (style="...") – without exception
  ── Exception: dynamic widths (style="width:62%") are allowed
  ── New colours → document in Design Rules first, then create CSS variable

  SPACING (allowed values from the grid):
  ── 4, 8, 12, 14, 16, 18, 20, 22, 24, 28, 32, 40px
  ── Other values only with a comment justification

  NEW UI ELEMENTS:
  ── Document in Blueprint first, then code
  ── Must comply with all design and layout rules
  ── No external CSS frameworks (no Bootstrap, Tailwind etc.)

  HOVER / TOUCH:
  ── Hover styles only under @media (hover: hover)
  ── Touch devices: :active for tap feedback
  ── No :hover on touch without @media guard

  INLINE STYLE EXCEPTIONS (documented):
  ── style="width:X%"        → progress bar fill (dynamic)
  ── style="display:none/block" → show/hide via JS (when no class fits)
  ── style="visibility:hidden"  → fc-actions initially hidden (flip logic)
  ── All other inline styles → rewrite as CSS class
-->


<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █            OPEN SOURCE / COLLABORATION RULES               █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  VERSIONING REQUIREMENT:
  ── Every change – no matter how small – requires a VERSION_LOG entry
  ── No push without a version entry
  ── Blueprint changes = PATCH entry

  GIT COMMITS:
  ── Format: [TYPE] Short description
  ── Example: [PATCH] Fix progress bar calculation
  ── Example: [MINOR] Add quiz mode
  ── Allowed types: MAJOR | MINOR | PATCH
  ── One commit = one logical change

  BRANCHES:
  ── feature/name  → new features
  ── fix/name      → bugfixes
  ── docs/name     → Blueprint / documentation
  ── No direct work on main

  NEW FEATURE:
  ── 1. Update Blueprint (PATCH for Blueprint change)
  ── 2. Add i18n keys in all 4 languages
  ── 3. Implement the feature
  ── 4. Add VERSION_LOG entry (MINOR)
  ── 5. Commit and push

  BUGFIX:
  ── 1. Describe the bug in the commit
  ── 2. Implement the fix
  ── 3. Add VERSION_LOG entry (PATCH)
  ── 4. Commit and push
-->

<!--
  ██████████████████████████████████████████████████████████████
  █                                                            █
  █                     VERSIONIERUNG                         █
  █                                                            █
  ██████████████████████████████████████████████████████████████

  SCHEMA: Semantic Versioning → MAJOR.MINOR.PATCH
  AKTUELLE VERSION: 0.5.1  (automatisch aus VERSION_LOG)

  MAJOR – Kompletter Umbau oder Breaking Change
  ── Beispiel: komplettes UI-Redesign
  ── Beispiel: JSON-Struktur ändert sich (alte Dateien inkompatibel)
  ── Beispiel: eine ganze Seite wird ersetzt oder entfernt
  ── → Erhöhung setzt MINOR und PATCH auf 0 zurück

  MINOR – Neue Funktion oder neue Seite
  ── Beispiel: Quiz-Modus wird hinzugefügt         → 0.1.0 → 0.2.0
  ── Beispiel: Mehrsprachigkeit wird eingebaut     → 0.2.0 → 0.3.0
  ── Beispiel: neue Statistik-Ansicht              → 0.3.0 → 0.4.0
  ── → Erhöhung setzt PATCH auf 0 zurück

  PATCH – Bugfix, kleine Anpassung ODER Layout-/Regel-Änderung
  ── Beispiel: Fortschrittsbalken zeigt falsche % → 0.1.0 → 0.1.1
  ── Beispiel: Button-Farbe korrigiert             → 0.1.1 → 0.1.2
  ── Beispiel: Breakpoint-Wert angepasst           → 0.1.2 → 0.1.3
  ── Beispiel: Neue Regel im Blueprint             → 0.1.3 → 0.1.4
  ── WICHTIG: Auch Blueprint-Änderungen brauchen einen PATCH-Eintrag

  AUTOMATISIERUNG (einzige Stelle die man pflegt):
  ── VERSION_LOG im Code ist die einzige Quelle der Wahrheit
  ── APP_VERSION wird automatisch aus dem letzten Eintrag abgeleitet
  ── Dateititel, Nav, Welcome-Screen → alle automatisch aktualisiert
  ── Neuer Release = neuer Eintrag in VERSION_LOG + i18n-Key in 4 Sprachen

  VERSIONSVERLAUF (vollständig, alle Einträge):
  ── 0.1.0  [MINOR]  Willkommen, Bibliothek, Deck-Verwaltung
  ── 0.2.0  [MINOR]  Deck-Detail, Deck erstellen, Karten verwalten
  ── 0.3.0  [MINOR]  Karteikarten, Quiz, Spaced Repetition
  ── 0.3.1  [PATCH]  Bugfixes: Kartenflip, Quiz-Antworten, Zusammenfassung
  ── 0.4.0  [MINOR]  Statistiken, Einstellungen, Sprachwahl, Reset
  ── 0.5.0  [MINOR]  Haupt-Interface (Hub), Responsives Layout, i18n Versionslog
  ── 0.5.1  [PATCH]  Responsives Layout Handy & Tablet, automatische Version, i18n Fix

  ANZEIGE IN DER APP (Einstellungen):
  ── Alle Einträge sichtbar (MAJOR + MINOR + PATCH)
  ── Typ-Badge farbig: MAJOR = Rot, MINOR = Gold, PATCH = Gedimmt
  ── Neueste Version zuerst
-->

  ██████████████████████████████████████████████████████████████

  UNTERSTÜTZTE SPRACHEN:
  ── Englisch (Basis / Fallback) ← PFLICHT, immer vollständig
  ── Deutsch
  ── Französisch
  ── Spanisch

  REGELN:
  ── Kein hardcodierter Text im HTML oder JS – ausnahmslos
  ── Jeder neue Text muss in allen 4 Sprachen eingetragen werden
  ── Fehlt ein Übersetzungsschlüssel → Fallback auf Englisch, nie leer
  ── Englisch ist die Basis – zuerst auf Englisch schreiben, dann übersetzen
  ── Alle Keys in camelCase Englisch (z.B. "libraryTitle")
  ── Versions-Log-Beschreibungen sind ebenfalls i18n-Keys (z.B. "ver051")

  SPRACHWECHSEL:
  ── setLanguage(lang) → state.language setzen → applyLanguage() aufrufen
  ── applyLanguage() rendert ALLE sichtbaren UI-Texte neu
  ── Sprache wird in der JSON-Datei des Nutzers gespeichert
  ── Beim Import: applyLanguage() wird sofort nach dem Laden aufgerufen

  NEUE TEXTE HINZUFÜGEN:
  ── 1. Key in i18n.en eintragen (Pflicht)
  ── 2. Key in i18n.de, i18n.fr, i18n.es eintragen (Pflicht)
  ── 3. t('key') im HTML/JS verwenden – nie direkt Text schreiben
  ── 4. applyLanguage() updaten falls der Text dynamisch gerendert wird
-->
